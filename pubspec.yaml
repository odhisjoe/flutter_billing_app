name: billing_app
description: POS MASHINANI - Mobile Point of Sale & Billing System
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.6.7
  equatable: ^2.0.5
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Code Generation Annotations
  json_annotation: ^4.9.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Database (Primary - Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Database (Secondary - SQLite for complex queries + queues)
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  
  # Security
  crypto: ^3.0.3
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  
  # Networking
  dio: ^5.4.0
  
  # Background Sync
  workmanager: ^0.9.0+3
  
  # UI & Utilities
  google_fonts: ^6.1.0
  vibration: ^3.1.8
  intl: ^0.19.0
  permission_handler: ^11.3.1
  fl_chart: ^1.2.0
  
  # Scanner & Printer
  pretty_qr_code: ^3.3.0
  print_bluetooth_thermal: ^1.1.2
  mobile_scanner: ^5.1.0
  bloc: ^8.1.4
  uuid: ^4.5.2
  app_settings: ^7.0.0
  image_picker: ^1.0.4
  file_picker: ^11.0.2

  # Export
  excel: ^4.0.0
  pdf: ^3.10.8
  printing: ^5.13.1
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  open_filex: ^4.5.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  url_launcher: ^6.3.0
  windows_printer: ^0.2.1
  flutter_thermal_printer_windows: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
