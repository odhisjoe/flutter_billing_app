services:
  - type: web
    name: pos-backend
    env: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SERVER_URL
        sync: false
      - key: MPESA_ENV
        value: sandbox
      - key: BACKUP_STORAGE_ENDPOINT
        sync: false
      - key: BACKUP_STORAGE_REGION
        value: auto
      - key: BACKUP_STORAGE_BUCKET
        sync: false
      - key: BACKUP_STORAGE_ACCESS_KEY
        sync: false
      - key: BACKUP_STORAGE_SECRET_KEY
        sync: false

  - type: cron
    name: hourly-backup
    env: node
    region: frankfurt
    plan: free
    schedule: "0 * * * *"
    buildCommand: npm install && npm run build
    startCommand: node dist/cron/hourly-backup.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: BACKUP_STORAGE_ENDPOINT
        sync: false
      - key: BACKUP_STORAGE_REGION
        value: auto
      - key: BACKUP_STORAGE_BUCKET
        sync: false
      - key: BACKUP_STORAGE_ACCESS_KEY
        sync: false
      - key: BACKUP_STORAGE_SECRET_KEY
        sync: false
